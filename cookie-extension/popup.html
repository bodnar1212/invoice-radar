<!DOCTYPE html>
<html>
<head>
<style>
  body { width: 300px; padding: 16px; font-family: system-ui, sans-serif; font-size: 14px; }
  h3 { margin: 0 0 8px; }
  .info { color: #666; margin-bottom: 12px; font-size: 12px; }
  button { width: 100%; padding: 10px; margin: 4px 0; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; font-size: 14px; background: #f5f5f5; }
  button:hover { background: #e8e8e8; }
  .success { color: #16a34a; }
  .error { color: #dc2626; }
  #status { margin-top: 10px; min-height: 20px; }
</style>
</head>
<body>
  <h3>Invoice Radar Cookies</h3>
  <p class="info">Cookies auto-sync to auth files when they change. Use buttons below to manually copy to clipboard.</p>
  <button id="cursor">Copy Cursor Auth JSON</button>
  <button id="claude">Copy Claude Auth JSON</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
